<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pilih Mode</title>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      font-family: 'Inter', sans-serif;
      background: #4B2E4C;
      color: #F8F9FA;

      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }

    .container {
      width: 100%;
      max-width: 500px;
      text-align: center;
    }

    h1 {
      color: #F6C32E;
      margin-bottom: 25px;
    }

    .card {
      background: #2E1B2F;
      padding: 25px;
      border-radius: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);

      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .btn {
      padding: 14px;
      border-radius: 14px;
      border: none;
      cursor: pointer;
      font-weight: 600;

      background: #F6C32E;
      color: #2E1B2F;

      box-shadow: 0 4px 0 #d4a91f;
      transition: 0.15s;
    }

    .btn:hover {
      transform: translateY(-2px);
    }

    .btn:active {
      transform: translateY(2px);
      box-shadow: 0 1px 0 #d4a91f;
    }

    .back {
      margin-top: 15px;
      font-size: 13px;
      opacity: 0.7;
      cursor: pointer;
    }

  </style>
</head>

<body>

  <div class="container">
    <h1>Pilih Mode</h1>

    <div class="card">

      <button class="btn" onclick="go('madhi.html')">
        Fi'il Madhi
      </button>

      <button class="btn" onclick="go('mudhari.html')">
        Fi'il Mudhari'
      </button>

      <button class="btn" onclick="go('isim.html')">
        Isim
      </button>

    </div>

    <div class="back" onclick="history.back()">
      ← Kembali
    </div>
  </div>

  <script>
    function go(url) {
      window.location.href = url;
    }
  </script>

</body>
</html>
