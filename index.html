<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Arabica</title>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: 'Inter', sans-serif;
      background: #4B2E4C;
      color: #F8F9FA;

      display: flex;
      justify-content: center;
      align-items: center;

      min-height: 100vh;
      padding: 20px;
    }

    .container {
      text-align: center;
      width: 100%;
      max-width: 500px;
    }

    h1 {
      font-size: clamp(26px, 5vw, 42px);
      font-weight: 800;
      color: #F6C32E;
      margin-bottom: 10px;
    }

    .subtitle {
      opacity: 0.8;
      margin-bottom: 30px;
      font-size: 14px;
    }

    /* CARD */
    .card {
      background: #2E1B2F;
      padding: 25px;
      border-radius: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);

      display: flex;
      gap: 15px;
      justify-content: center;
      flex-wrap: wrap; /* 🔥 penting buat mobile */
    }

    /* BUTTON */
    .btn {
      flex: 1;
      min-width: 140px;
      max-width: 200px;
      height: 120px;

      border-radius: 16px;
      border: none;
      cursor: pointer;

      background: #F6C32E;
      color: #2E1B2F;

      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;

      font-weight: 600;

      box-shadow: 0 6px 0 #d4a91f;

      transition: all 0.15s ease;
    }

    .btn:hover {
      transform: translateY(-3px);
    }

    .btn:active {
      transform: translateY(2px);
      box-shadow: 0 2px 0 #d4a91f;
    }

    .icon {
      font-size: 24px;
      margin-bottom: 8px;
    }

    /* MOBILE FIX */
    @media (max-width: 480px) {
      .card {
        flex-direction: column; /* 🔥 jadi ke bawah */
      }

      .btn {
        width: 100%;
        max-width: none;
        height: 90px;
        flex-direction: row;
        justify-content: center;
        gap: 10px;
      }

      .icon {
        margin-bottom: 0;
      }
    }

  </style>
</head>

<body>

  <div class="container">
    <h1>Mahadhitia Arabica</h1>
    <div class="subtitle">Platform Latihan Bahasa Arab</div>

    <div class="card">

      <button class="btn" onclick="go('menu.html')">
        <div class="icon">📘</div>
        Mulai Latihan
      </button>

      <button class="btn" onclick="go('profil.html')">
        <div class="icon">👨‍💻</div>
        Profil
      </button>

    </div>
  </div>

  <script>
    function go(url) {
      window.location.href = url;
    }
  </script>

</body>
</html>
