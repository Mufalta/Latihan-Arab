<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Arabica</title>

  <!-- FONT -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: 'Inter', sans-serif;
      background: #4B2E4C;
      color: #F8F9FA;

      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .container {
      text-align: center;
    }

    /* =========================
       TITLE
    ========================= */
    h1 {
      font-size: 42px;
      font-weight: 800;
      color: #F6C32E;
      margin-bottom: 10px;
    }

    .subtitle {
      opacity: 0.8;
      margin-bottom: 40px;
    }

    /* =========================
       CARD (BIAR KAYAK MODE)
    ========================= */
    .card {
      background: #2E1B2F;
      padding: 40px;
      border-radius: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);

      display: flex;
      gap: 20px;
      justify-content: center;
    }

    /* =========================
       BUTTON
    ========================= */
    .btn {
      width: 180px;
      height: 140px;

      border-radius: 16px;
      border: none;
      cursor: pointer;

      background: #F6C32E;
      color: #2E1B2F;

      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;

      font-weight: 600;

      box-shadow: 0 6px 0 #d4a91f;

      transition: all 0.15s ease;
      position: relative;
    }

    .btn:hover {
      transform: translateY(-3px);
    }

    .btn:active {
      transform: translateY(2px);
      box-shadow: 0 2px 0 #d4a91f;
    }

    .icon {
      font-size: 28px;
      margin-bottom: 10px;
    }

    /* efek klik halus */
    .btn.clicked {
      animation: clickBounce 0.2s ease;
    }

    @keyframes clickBounce {
      0% { transform: scale(1); }
      50% { transform: scale(0.94); }
      100% { transform: scale(1); }
    }

  </style>
</head>

<body>

  <div class="container">
    <h1>Mahadhitia Arabica</h1>
    <div class="subtitle">Platform Latihan Bahasa Arab</div>

    <div class="card">

      <!-- MULAI -->
      <button class="btn" onclick="go('menu.html', this)">
        <div class="icon">📘</div>
        Mulai Latihan
      </button>

      <!-- PROFIL -->
      <button class="btn" onclick="go('profil.html', this)">
        <div class="icon">👨‍💻</div>
        Profil
      </button>

    </div>
  </div>

  <script>
    function go(url, el) {
      el.classList.add("clicked");

      setTimeout(() => {
        window.location.href = url;
      }, 150);
    }
  </script>

</body>
</html>
