<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Arabica</title>

  <!-- FONT -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Noto+Naskh+Arabic&display=swap" rel="stylesheet">

  <style>
    * {
      box-sizing: border-box;
    }
  
    html, body {
      margin: 0;
      padding: 0;
      overflow: hidden;
    }
    
    body {
      font-family: 'Inter', sans-serif;
      background: #006D77;
      color: #EDF6F9;
    
      display: flex;
      justify-content: center;
      align-items: center;
    
      height: 100dvh;
    }
    
    .app {
      width: 100%;
      max-width: 600px;
      text-align: center;
      padding: 16px;
      transform: translateY(-5vh);
    }
  
    h1 {
      font-size: 22px;
      margin-bottom: 25px;
      font-weight: 800;
      color: #EDF6F9;
    }
  
    .card {
      background: #83C5BE;
      padding: 30px 25px;
      border-radius: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.3);
      animation: pop 0.3s ease;
    }
  
    #question {
      font-size: 20px;
      margin: 20px 0 12px;
      font-weight: 600;
      color: #003845;
    }
  
    #answer {
      font-size: 32px;
      margin: 25px 0;
      color: #006D77;
      font-family: 'Noto Naskh Arabic', serif;
    }
  
    .answer-box {
      background: #EDF6F9;
      border-radius: 12px;
      padding: 15px;
      margin-top: 20px;
      border: 1px solid #83C5BE;
    }
  
    .label {
      display: inline-block;
      padding: 4px 10px;
      font-size: 12px;
      background: #006D77;
      color: #EDF6F9;
      border-radius: 999px;
      margin-top: 8px;
      margin-bottom: 15px;
    }
  
    .buttons {
      margin-top: 20px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
  
    button {
      position: relative;
      overflow: hidden;
    
      padding: 14px;
      border-radius: 14px;
      font-size: 16px;
      font-weight: 600;
      border: none;
      cursor: pointer;
    
      transition: all 0.15s ease;
    }
  
    .generate {
      background: #006D77;
      color: #EDF6F9;
      box-shadow: 0 4px 0 #004f56;
    }
    
    .generate:hover {
      background: #005f66;
    }
    
    .generate:active {
      box-shadow: 0 1px 0 #004f56;
    }
  
    .answer-btn {
      background: #EDF6F9;
      color: #006D77;
    }
    
    .answer-btn:hover {
      background: #d6eef3;
    }
  
    .footer {
      position: fixed;
      bottom: 12px;
      width: 100%;
      text-align: center;
      font-size: 12px;
      color: #EDF6F9;
      opacity: 0.7;
    }
  
    button::after {
      content: "";
      position: absolute;
      width: 100px;
      height: 100px;
      background: rgba(255,255,255,0.2);
      border-radius: 50%;
      transform: scale(0);
      opacity: 0;
      pointer-events: none;
    }
    
    button:active::after {
      transform: scale(2px);
      opacity: 1;
      transition: transform 0.4s, opacity 0.6s;
    }
  
    button:hover {
      transform: translateY(-1px);
    }
  
    #questionWrap, #answerWrap {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }
    
    .audio-icon {
      cursor: pointer;
      font-size: 18px;
      opacity: 0.7;
      transition: 0.2s;
    }
    
    .audio-icon:hover {
      opacity: 1;
      transform: scale(1.2);
    }
  </style>
</head>

<body>

  <div class="app">
    <h1>Latihan Bahasa Arab</h1>

    <div class="card">

      <!-- Soal -->
      <div id="questionWrap">
        <span class="audio-icon" onclick="playQuestion()">🔊</span>
        <span id="question">Klik "Buat Kalimat"</span>
      </div>

      <!-- Jawaban -->
      <div class="answer-box" id="answerWrap" style="display:none;">
        <span class="audio-icon" onclick="playAnswer()">🔊</span>
        <span id="answer"></span>
      </div>

      <!-- Label (tunggal, jamak, dll) -->
      <div id="label" class="label"></div>

      <!-- Tombol -->
      <div class="buttons">
        <button class="generate" onclick="generateSentence()">Buat Kalimat</button>
        <button class="answer-btn" onclick="showAnswer()">Lihat Jawaban</button>
        <button class="answer-btn" onclick="toggleMode()" id="modeBtn">
          Fi'il Madhi
        </button>
      </div>

    </div>
  </div>

  <div class="footer">
    Dibuat oleh Mahadhitia
  </div>

  <script src="script.js"></script>

</body>
</html>
