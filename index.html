<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Arabica</title>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

  <style>
    * {
      box-sizing: border-box;
    }
    
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      overflow: hidden; /* 🔥 MATIIN SCROLL TOTAL */
    }
    
    body {
      font-family: 'Inter', sans-serif;
      background: #4B2E4C;
      color: #F8F9FA;
    
      display: flex;
      justify-content: center;
      align-items: center;
    }
    
    /* CONTAINER */
    .container {
      text-align: center;
      width: 100%;
      max-width: 400px; /* 🔥 dipersempit */
      padding: 0 20px;
    }
    
    /* TITLE */
    h1 {
      font-size: clamp(32px, 5vw, 56px);
      font-weight: 800;
      color: #F6C32E;
      margin-bottom: 8px;
    }

    /* Desktop */
    @media (min-width: 600px) {
      h1 {
        white-space: nowrap;
      }
    }
    
    .subtitle {
      font-size: 13px;
      opacity: 0.7;
      margin-bottom: 35px;
    }
    
    /* CARD */
    .card {
      background: #2E1B2F;
      padding: 22px;
      border-radius: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    
      display: flex;
      flex-direction: column;
      align-items: center; /* 🔥 tombol tidak full */
      gap: 16px;
    }
    
    /* BUTTON */
    .btn {
      width: 70%;
      max-width: 220px;
      height: 85px;
  
      border-radius: 16px;
      border: none;
      cursor: pointer;
    
      background: #F6C32E;
      color: #2E1B2F;
    
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
    
      font-weight: 600;
      font-size: 15px;
    
      box-shadow: 0 6px 0 #d4a91f;
    
      transition: all 0.15s ease;
    }
    
    /* INTERACTION */
    .btn:hover {
      transform: translateY(-2px);
    }
    
    .btn:active {
      transform: translateY(2px);
      box-shadow: 0 2px 0 #d4a91f;
    }
    
    /* ICON */
    .icon {
      font-size: 26px;
      margin-bottom: 8px;
    }
  </style>
</head>

<body>

  <div class="container">
    <h1>Mahadhitia Arabica</h1>
    <div class="subtitle">Platform Latihan Bahasa Arab</div>

    <div class="card">

      <button class="btn" onclick="go('menu.html')">
        <div class="icon">📘</div>
        Mulai Latihan
      </button>

      <button class="btn" onclick="go('profil.html')">
        <div class="icon">👨‍💻</div>
        Profil
      </button>

    </div>
  </div>

  <script>
    function go(url) {
      window.location.href = url;
    }
  </script>

</body>
</html>
