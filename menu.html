<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pilih Mode</title>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

  <style>
    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      overflow: hidden; /* 🔥 no scroll */
    }

    body {
      font-family: 'Inter', sans-serif;
      background: #4B2E4C;
      color: #F8F9FA;

      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding-top: 180px;
    }

    /* CONTAINER */
    .container {
      text-align: center;
      width: 100%;
      max-width: 700px;
      padding: 0 20px;
    }

    /* TITLE */
    h1 {
      font-size: 42px;
      font-weight: 800;
      color: #F6C32E;
      margin-bottom: 35px;
      line-height: 1.2;
    }

    @media (max-width: 480px) {
      h1 {
        font-size: 32px;
      }
    }

    /* CARD */
    .card {
      background: #2E1B2F;
      padding: 25px;
      border-radius: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);

      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 18px;

      width: 65%;
      max-width: 280px;
      margin: 0 auto;
    }

    /* BUTTON UTAMA */
    .btn {
      width: 65%;
      height: 60px;

      border-radius: 16px;
      border: none;
      cursor: pointer;

      background: #F6C32E;
      color: #2E1B2F;

      display: flex;
      justify-content: center;
      align-items: center;

      font-weight: 600;
      font-size: 14px;

      box-shadow: 0 6px 0 #d4a91f;
      transition: all 0.15s ease;

      white-space: nowrap;
    }

    .btn:hover {
      transform: translateY(-2px);
    }

    .btn:active {
      transform: translateY(2px);
      box-shadow: 0 2px 0 #d4a91f;
    }

    /* BUTTON HOME */
    .btn-home {
      width: 65%;
      max-width: 280px;
      height: 55px;
    
      border-radius: 16px;
      border: none;
      cursor: pointer;
    
      background: #5A3A5C; /* 🔥 ungu muda */
      color: #F8F9FA;
    
      font-size: 20px;
    
      margin: 25px auto 0 auto;
    
      display: flex;
      justify-content: center;
      align-items: center;
    
      transition: 0.15s;
    }
    
    .btn-home:hover {
      transform: translateY(-2px);
    }
    
    .btn-home:active {
      transform: translateY(2px);
    }
    
  </style>
</head>

<body>

  <div class="container">
    <h1>Pilih Mode</h1>

    <div class="card">

      <button class="btn" onclick="go('madhi.html')">
        Fi'il Madhi
      </button>

      <button class="btn" onclick="go('mudhari.html')">
        Fi'il Mudhari'
      </button>

      <button class="btn" onclick="go('isim.html')">
        Isim
      </button>

    </div>

    <!-- 🔥 tombol kembali pindah ke bawah -->
    <button class="btn-home" onclick="go('index.html')">
      🏠
    </button>

  </div>

  <script>
    function go(url) {
      window.location.href = url;
    }
  </script>

</body>
</html>
